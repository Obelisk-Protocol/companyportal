<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3.5 text-on-surface placeholder:text-outline/60 focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="email" placeholder="name@company.com" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline/40" data-icon="alternate_email">alternate_email</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="font-label text-xs font-semibold text-on-surface-variant uppercase tracking-wider" for="password">Password</label>
<a class="text-xs font-semibold text-primary-container hover:underline" href="#">Forgot password?</a>
</div>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-3.5 text-on-surface placeholder:text-outline/60 focus:bg-surface-container-lowest focus:ring-2 focus:ring-primary/20 transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline/40 cursor-pointer" data-icon="visibility">visibility</span>
</div>
</div>
<!-- Primary CTA -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-lg shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        Sign In
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider Alternative: Tonal Shift -->
<div class="my-8 flex items-center gap-4">
<div class="h-px flex-1 bg-outline-variant/20"></div>
<span class="text-[10px] font-bold text-outline uppercase tracking-[0.2em]">Secure Access</span>
