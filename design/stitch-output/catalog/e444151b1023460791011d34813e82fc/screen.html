<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Obelisk Expense Submit</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Public+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary": "#532800",
                    "tertiary-container": "#743b00",
                    "on-error-container": "#93000a",
                    "primary-fixed-dim": "#a0c9ff",
                    "on-tertiary-fixed": "#2f1400",
                    "on-secondary-fixed-variant": "#304a55",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#8ebdf9",
                    "primary-container": "#0f4c81",
                    "surface-tint": "#2d6197",
                    "surface-container": "#eceef0",
                    "surface-container-low": "#f2f4f6",
                    "surface-variant": "#e0e3e5",
                    "primary-fixed": "#d2e4ff",
                    "on-primary-fixed": "#001c37",
                    "error-container": "#ffdad6",
                    "inverse-surface": "#2d3133",
                    "surface-dim": "#d8dadc",
                    "tertiary-fixed-dim": "#ffb780",
                    "surface": "#f7f9fb",
                    "on-primary-fixed-variant": "#07497d",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#f7f9fb",
                    "on-error": "#ffffff",
                    "on-secondary": "#ffffff",
                    "outline-variant": "#c2c7d1",
                    "on-tertiary-container": "#f9a767",
                    "secondary": "#48626e",
                    "secondary-fixed-dim": "#afcbd8",
                    "inverse-primary": "#a0c9ff",
                    "secondary-container": "#cbe7f5",
                    "secondary-fixed": "#cbe7f5",
                    "on-surface": "#191c1e",
                    "inverse-on-surface": "#eff1f3",
                    "outline": "#727780",
                    "tertiary-fixed": "#ffdcc4",
                    "on-tertiary": "#ffffff",
                    "on-background": "#191c1e",
                    "on-tertiary-fixed-variant": "#6f3800",
                    "on-secondary-fixed": "#021f29",
                    "on-secondary-container": "#4e6874",
                    "on-surface-variant": "#42474f",
                    "background": "#f7f9fb",
                    "primary": "#00355f",
                    "error": "#ba1a1a",
                    "surface-container-high": "#e6e8ea",
                    "surface-container-highest": "#e0e3e5"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Public Sans"],
                    "label": ["Public Sans"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .tonal-transition-no-border {
        border: none !important;
      }
      .tap-highlight-none {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-[#f7f9fb]/70 dark:bg-[#191c1e]/70 backdrop-blur-xl fixed top-0 w-full z-50 shadow-[0_32px_64px_rgba(25,28,30,0.06)] flex items-center justify-between px-6 py-4 w-full">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden bg-surface-container-high">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="close-up portrait of a professional male in a clean white office environment with soft natural lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAYooRYy4b4SbFiLWmrlmrYJWe45OrJ08Rx8wuNqrsLq4X4PzxRjehxpaTnrFa0W6m0zZPdpC6q96JBpje4CgfTrsEiL-gO4S5BiW7MfGrDms5AtENQLYlTPb3RWobam4700pLffh84GyYryaIPZ571_UPLDfg0XMGa5QiZd-AaMTJr2Pq1JdjaAPgM6X5CgHGBlgbakSAILkn_so0PFN1SEwF1k3Rocno3fp_elyNK_Q-dS0fVX-Z_BleH19nFzer1nmth7qM3MQA"/>
</div>
<span class="text-xl font-bold text-[#00355f] dark:text-[#d1e4ff] font-headline tracking-tight">Obelisk</span>
</div>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#00355f] dark:text-[#d1e4ff] hover:opacity-80 transition-opacity scale-95 active:scale-90">dark_mode</button>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto">
<!-- Header Section -->
<section class="mb-8">
<h1 class="font-headline text-4xl font-extrabold tracking-tight text-primary mb-2">New Expense</h1>
<p class="text-on-surface-variant font-body">Submit your reimbursement request for review.</p>
</section>
<!-- Form Canvas -->
<div class="space-y-6">
<!-- Amount & Date (Asymmetric Pair) -->
<div class="grid grid-cols-1 md:grid-cols-5 gap-4">
<div class="md:col-span-3 bg-surface-container-low p-6 rounded-xl transition-all duration-300">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-2">Transaction Amount</label>
<div class="flex items-baseline gap-2">
<span class="text-2xl font-bold text-primary">IDR</span>
<input class="bg-transparent border-none p-0 text-4xl font-extrabold text-primary placeholder:text-surface-variant focus:ring-0 w-full" placeholder="0.00" type="text"/>
</div>
</div>
<div class="md:col-span-2 bg-surface-container-low p-6 rounded-xl">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-2">Date</label>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">calendar_today</span>
<input class="bg-transparent border-none p-0 font-semibold text-primary focus:ring-0 w-full" type="date" value="2023-11-24"/>
</div>
</div>
</div>
<!-- Category Selection -->
<div class="bg-surface-container-low p-6 rounded-xl">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-4">Expense Category</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full bg-primary text-white text-sm font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">restaurant</span> Dining
                    </button>
<button class="px-4 py-2 rounded-full bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-high transition-colors text-sm font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">flight_takeoff</span> Travel
                    </button>
<button class="px-4 py-2 rounded-full bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-high transition-colors text-sm font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">commute</span> Transport
                    </button>
<button class="px-4 py-2 rounded-full bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-high transition-colors text-sm font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">inventory_2</span> Office
                    </button>
<button class="px-4 py-2 rounded-full bg-surface-container-lowest text-on-surface-variant hover:bg-surface-container-high transition-colors text-sm font-medium flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">more_horiz</span> Others
                    </button>
</div>
</div>
<!-- Receipt Upload Zone -->
<div class="relative group">
<div class="border-2 border-dashed border-outline-variant bg-surface-container-lowest hover:bg-surface-container-low transition-all duration-300 rounded-2xl p-12 flex flex-col items-center justify-center text-center cursor-pointer min-h-[240px]">
<div class="w-16 h-16 bg-primary-fixed rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-3xl">cloud_upload</span>
</div>
<h3 class="font-headline text-xl font-bold text-primary mb-1">Upload Receipt</h3>
<p class="text-on-surface-variant text-sm max-w-[200px]">Drag and drop your file here, or click to browse (PDF, PNG, JPG)</p>
</div>
</div>
<!-- Notes field -->
<div class="bg-surface-container-low p-6 rounded-xl">
<label class="block text-xs font-semibold uppercase tracking-wider text-on-surface-variant mb-2">Additional Notes</label>
<textarea class="w-full bg-transparent border-none p-0 text-on-surface placeholder:text-surface-variant focus:ring-0 resize-none font-body" placeholder="Describe the purpose of this expense..." rows="3"></textarea>
</div>
</div>
</main>
<!-- Sticky Submit Button Area -->
<div class="fixed bottom-[88px] left-0 w-full px-6 py-4 flex justify-center pointer-events-none">
<button class="pointer-events-auto w-full max-w-2xl bg-gradient-to-br from-[#00355f] to-[#0f4c81] text-white font-headline font-bold py-4 rounded-xl shadow-lg hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2">
            Submit Expense <span class="material-symbols-outlined">send</span>
</button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2 bg-white dark:bg-[#191c1e] shadow-[0_-8px_24px_rgba(25,28,30,0.04)] z-50 rounded-t-2xl">
<div class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors tap-highlight-none active:opacity-70">
<span class="material-symbols-outlined">home</span>
<span class="font-['Public_Sans'] text-[10px] font-medium tracking-wide uppercase">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors tap-highlight-none active:opacity-70">
<span class="material-symbols-outlined">business_center</span>
<span class="font-['Public_Sans'] text-[10px] font-medium tracking-wide uppercase">Work</span>
</div>
<!-- Money is ACTIVE -->
<div class="flex flex-col items-center justify-center bg-[#0f4c81] text-white dark:bg-[#d1e4ff] dark:text-[#00355f] rounded-xl px-3 py-1.5 tap-highlight-none active:opacity-70">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="font-['Public_Sans'] text-[10px] font-medium tracking-wide uppercase">Money</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors tap-highlight-none active:opacity-70">
<span class="material-symbols-outlined">group</span>
<span class="font-['Public_Sans'] text-[10px] font-medium tracking-wide uppercase">People</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-3 py-1.5 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors tap-highlight-none active:opacity-70">
<span class="material-symbols-outlined">menu</span>
<span class="font-['Public_Sans'] text-[10px] font-medium tracking-wide uppercase">More</span>
</div>
</nav>
</body></html>
